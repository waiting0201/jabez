<div class="container-fluid py-3">
  <div class="flex items-center gap-2 mb-6">
    <h4 class="mb-0">修改密碼</h4>
  </div>

  @if (isForced) {
    <div class="alert alert-warning flex items-center gap-2 mb-6 py-2" role="alert">
      <svg class="sa-icon" style="stroke: currentColor"><use href="/assets/icons/sprite.svg#alert-triangle"></use></svg>
      基於安全性考量，請立即修改您的密碼後才能繼續使用系統。
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-4">
      <div class="col-12 col-lg-8 col-xl-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body">

            <!-- 舊密碼 -->
            <div class="mb-4">
              <label class="form-label fw-500">舊密碼 <span class="text-danger">*</span></label>
              <div class="relative">
                <input [type]="showCurrentPassword() ? 'text' : 'password'"
                       class="form-control pr-10" formControlName="currentPassword"
                       placeholder="請輸入目前的密碼">
                <button type="button"
                        class="absolute right-2 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer p-1 text-[--text-muted] hover:text-[--text-primary]"
                        (click)="showCurrentPassword.set(!showCurrentPassword())">
                  <svg class="sa-icon" style="width:1.1rem;height:1.1rem;stroke:currentColor">
                    <use [attr.href]="'/assets/icons/sprite.svg#' + (showCurrentPassword() ? 'eye-off' : 'eye')"></use>
                  </svg>
                </button>
              </div>
            </div>

            <!-- 新密碼 -->
            <div class="mb-4">
              <label class="form-label fw-500">新密碼 <span class="text-danger">*</span></label>
              <div class="relative">
                <input [type]="showNewPassword() ? 'text' : 'password'"
                       class="form-control pr-10" formControlName="newPassword"
                       placeholder="至少 6 碼">
                <button type="button"
                        class="absolute right-2 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer p-1 text-[--text-muted] hover:text-[--text-primary]"
                        (click)="showNewPassword.set(!showNewPassword())">
                  <svg class="sa-icon" style="width:1.1rem;height:1.1rem;stroke:currentColor">
                    <use [attr.href]="'/assets/icons/sprite.svg#' + (showNewPassword() ? 'eye-off' : 'eye')"></use>
                  </svg>
                </button>
              </div>
              @if (form.get('newPassword')?.hasError('minlength') && form.get('newPassword')?.touched) {
                <div class="text-danger small mt-1">密碼長度至少 6 碼。</div>
              }
            </div>

            <!-- 確認密碼 -->
            <div class="mb-0">
              <label class="form-label fw-500">確認新密碼 <span class="text-danger">*</span></label>
              <div class="relative">
                <input [type]="showConfirmPassword() ? 'text' : 'password'"
                       class="form-control pr-10" formControlName="confirmPassword"
                       placeholder="再次輸入新密碼">
                <button type="button"
                        class="absolute right-2 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer p-1 text-[--text-muted] hover:text-[--text-primary]"
                        (click)="showConfirmPassword.set(!showConfirmPassword())">
                  <svg class="sa-icon" style="width:1.1rem;height:1.1rem;stroke:currentColor">
                    <use [attr.href]="'/assets/icons/sprite.svg#' + (showConfirmPassword() ? 'eye-off' : 'eye')"></use>
                  </svg>
                </button>
              </div>
            </div>

          </div>
        </div>

        <div class="mt-6 flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting()">
            {{ submitting() ? '處理中...' : '確認修改' }}
          </button>
        </div>

      </div>
    </div>
  </form>
</div>
